services:
  backend:
    build:
      context: ./server
    ports:
      - "5000:5000"
    environment:
      PLOTTER_HOST: http://localhost:5000
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

  client:
    build:
      context: ./client
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads_data:
