<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>ProyectoFinal — Demo</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --ok: #34d399;
      --err: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 2rem;
      max-width: 880px;
      margin-inline: auto;
    }
    h1 { margin-top: 0; }
    section {
      background: var(--panel);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    section h2 { margin: 0 0 .75rem; font-size: 1.1rem; color: var(--accent); }
    label { display: block; margin: .5rem 0; color: var(--muted); font-size: .9rem; }
    input[type="text"], input[type="file"] {
      width: 100%;
      padding: .5rem .75rem;
      background: #0b1220;
      color: var(--text);
      border: 1px solid #334155;
      border-radius: 6px;
      margin-top: .25rem;
    }
    button {
      background: var(--accent);
      color: #0f172a;
      border: none;
      padding: .55rem 1rem;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      margin-top: .5rem;
    }
    button:hover { filter: brightness(1.1); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    pre {
      background: #0b1220;
      padding: .75rem;
      border-radius: 6px;
      overflow-x: auto;
      font-size: .85rem;
      color: var(--muted);
      min-height: 1.5rem;
    }
    .row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .row > div { flex: 1; min-width: 220px; }
    img { max-width: 100%; margin-top: .75rem; border-radius: 6px; background: white; }
    .ok { color: var(--ok); }
    .err { color: var(--err); }
  </style>
</head>
<body>
  <h1>ProyectoFinal — Demo de subida</h1>

  <section>
    <h2>1 · Crear proyecto</h2>
    <button id="btn-create">POST /proyects</button>
    <pre id="out-create">—</pre>
  </section>

  <section>
    <h2>2 · Subir ficheros</h2>
    <label>ID del proyecto
      <input id="proyect-id" type="text" value="1" />
    </label>
    <div class="row">
      <div>
        <label>Ficheros sueltos (varios con Ctrl/Shift)
          <input id="files-input" type="file" multiple />
        </label>
      </div>
      <div>
        <label>Carpeta entera (preserva subdirectorios)
          <input id="folder-input" type="file" webkitdirectory multiple />
        </label>
      </div>
    </div>
    <button id="btn-upload">POST /proyects/&lt;id&gt;/upload</button>
    <pre id="out-upload">—</pre>
  </section>

  <section>
    <h2>3 · Generar gráfica</h2>
    <button id="btn-plot">POST /proyects/&lt;id&gt;/execute_plots</button>
    <pre id="out-plot">—</pre>
    <img id="plot-img" alt="" hidden />
  </section>

  <script>
    const $ = (id) => document.getElementById(id);
    const show = (el, value, ok = true) => {
      el.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
      el.className = ok ? "ok" : "err";
    };

    $("btn-create").addEventListener("click", async () => {
      const r = await fetch("/proyects", { method: "POST" });
      const data = await r.json();
      show($("out-create"), data, r.ok);
      $("proyect-id").value = data.id;
    });

    $("btn-upload").addEventListener("click", async () => {
      const id = $("proyect-id").value.trim();
      const stripTopFolder = (p) => p.split("/").slice(1).join("/") || p;

      const fd = new FormData();
      for (const f of $("files-input").files) {
        fd.append("files", f, f.name);
      }
      for (const f of $("folder-input").files) {
        fd.append("files", f, stripTopFolder(f.webkitRelativePath));
      }

      const r = await fetch(`/proyects/${id}/upload`, { method: "POST", body: fd });
      show($("out-upload"), await r.json(), r.ok);
    });

    $("btn-plot").addEventListener("click", async () => {
      const id = $("proyect-id").value.trim();
      const r = await fetch(`/proyects/${id}/execute_plots`, { method: "POST" });
      const data = await r.json();
      show($("out-plot"), data, r.ok);
      const img = $("plot-img");
      img.src = data.url + "?t=" + Date.now();
      img.hidden = false;
    });
  </script>
</body>
</html>
